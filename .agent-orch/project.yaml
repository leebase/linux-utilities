version: 1
project:
  name: linux-utilities
  language: C
  docs_root: docs
  playbooks_root: playbooks
  artifacts_root: artifacts
agentflow:
  required_docs:
    - AGENTS.md
    - OPERATE.md
    - README.md
    - new-project-onboard.md
    - docs/project-onboarding.md
    - product-definition.md
    - project-plan.md
    - sprint-plan.md
    - architecture.md
    - context.md
    - result-review.md
    - WHERE_AM_I.md
workers:
  default: codex_cli
  allowed:
    - fake_worker
    - codex_cli
    - pi_cli
    - claude_code
    - grok_cli
onboarding:
  starter_workflow: playbooks/starter_proof.yaml
  workflow_template_set: standard
  proof_flow:
    type: workflow
    playbook: playbooks/starter_proof.yaml
    required_outputs:
      - docs/proof-output.md
commands:
  init_project:
    enabled: true
  init_workflow:
    enabled: true
  doctor:
    enabled: true
readiness:
  required_paths:
    - docs
    - playbooks
    - .agent-orch
  required_templates:
    - playbooks/templates/repair_before_review_feature_delivery.yaml
    - playbooks/templates/docs_only.yaml
    - playbooks/templates/bugfix.yaml
    - playbooks/templates/onboarding_ci_bootstrap.yaml
  required_workflows:
    - playbooks/starter_proof.yaml
